# ═══════════════════════════════════════════════════════════════════════
# Regular Investor Ecosystem — unified Docker Compose
#
# Brings up the whole stack:
#   db               MariaDB (shared)
#   redis            cache for the terminal backend
#   app              regular-investor (Astro SSR)         — auth hub, news, subs
#   terminal-backend ridx-terminal FastAPI + ML engine    — market data, OmniQuant, Premium DSS (/api/v1)
#   terminal-frontend ridx-terminal React (Nginx)         — terminal UI
#   nginx            host-based reverse proxy             — public entrypoint
#
# Usage:
#   cp .env.example .env   # then fill in secrets
#   docker compose up -d --build
# ═══════════════════════════════════════════════════════════════════════

networks:
  apps_net:
    name: apps_net
    ipam:
      config:
        - subnet: 172.20.10.0/28 # .1–.14 usable

volumes:
  ri_db_data:
  ridx_redis:
  ridx_models:
  ridx_data:

services:
  # ── Database ──────────────────────────────────────────────────────
  db:
    image: mariadb:latest
    container_name: ri_db
    restart: unless-stopped
    networks:
      apps_net:
        ipv4_address: 172.20.10.3
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-regular_investor}
      MYSQL_USER: ${DB_USER:-ri_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-your_strong_password_here}
      TZ: ${TZ:-Asia/Jakarta}
    ports:
      - "3306:3306"
    volumes:
      - ri_db_data:/var/lib/mysql
      - ./regular-investor/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./regular-investor/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ri_redis
    restart: unless-stopped
    networks:
      apps_net:
        ipv4_address: 172.20.10.5
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    environment:
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - ridx_redis:/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 3s
      retries: 3

  # ── Regular Investor (Astro SSR) ──────────────────────────────────
  app:
    build: ./regular-investor
    container_name: ri_app
    restart: unless-stopped
    networks:
      apps_net:
        ipv4_address: 172.20.10.4
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-ri_user}
      DB_PASSWORD: ${DB_PASSWORD:-your_strong_password_here}
      DB_NAME: ${DB_NAME:-regular_investor}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_SECRET: ${ADMIN_SECRET:-change_this_secret_to_32chars!!}
      USER_SECRET: ${USER_SECRET:-user_secret_change_me_32chars!!}
      APP_URL: ${APP_URL:-http://localhost:3000}
      TERMINAL_URL: ${TERMINAL_URL:-http://localhost:3001}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      # Consolidated: premium DSS + portfolio quotes now served by the
      # ridx-terminal backend (/api/v1/*) instead of a separate ml_engine.
      ML_ENGINE_URL: http://terminal-backend:8001
      TZ: ${TZ:-Asia/Jakarta}
    ports:
      - "3000:4321"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      db:
        condition: service_healthy
      terminal-backend:
        condition: service_started

  # NOTE: the standalone Regular Investor ML engine has been REMOVED.
  # Premium DSS + portfolio quotes are now served by `terminal-backend`
  # (/api/v1/*), consolidating the ecosystem onto a single Python backend.

  # ── R-IDX Terminal backend (FastAPI + ML) ─────────────────────────
  terminal-backend:
    build: ./ridx-terminal/backend
    container_name: ridx_backend
    restart: unless-stopped
    networks:
      apps_net:
        ipv4_address: 172.20.10.6
        # The terminal frontend's internal nginx proxies /api → http://backend:8001
        aliases:
          - backend
    environment:
      APP_ENV: production
      APP_PORT: 8001
      CORS_ORIGINS: ${TERMINAL_URL:-http://localhost:3001}
      CACHE_TTL_SECONDS: 300
      CACHE_TTL_OHLCV: 1800
      NEWS_CACHE_TTL: 600
      YF_HISTORY_PERIOD: 5y
      # Must equal the RI USER_SECRET so tokens verify across services.
      RI_USER_SECRET: ${USER_SECRET:-user_secret_change_me_32chars!!}
      REDIS_URL: redis://redis:6379/0
      # AI news sentiment (free LLM agents). Keys come from the root .env;
      # empty = sentiment disabled. Models/warmer use code defaults.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      SENTIMENT_PROVIDERS: ${SENTIMENT_PROVIDERS:-gemini,groq,hf1,hf2,hf3}
      # BPS WebAPI (Badan Pusat Statistik)
      BPS_API_KEY: ${BPS_API_KEY:-}
      BPS_API_URL: ${BPS_API_URL:-https://webapi.bps.go.id/v1/api}
      # Telegram buzz alerts
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      BUZZ_ALERT_ENABLED: "true"
      BUZZ_ALERT_INTERVAL: 900
      BUZZ_ALERT_MIN_MENTIONS: 2
      BUZZ_ALERT_TOP_N: 10
      BUZZ_ALERT_MAX_PER_CYCLE: 5
      # Public site URL used in the Telegram alert's "Buka Regular Investor" link.
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://regular-investor.com}
      # IDX ticker universe for startup load + periodic ML retraining (Fase G).
      IDX_TICKERS_FILE: /app/data/Daftar Saham.xlsx
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - ridx_models:/app/models
      - ridx_data:/app/data
      # Ticker list (read-only) — without this, retraining falls back to ~50 names.
      - "./ridx-terminal/Daftar Saham  - 20260613.xlsx:/app/data/Daftar Saham.xlsx:ro"
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      redis:
        condition: service_healthy

  # ── R-IDX Terminal frontend (React → Nginx) ───────────────────────
  terminal-frontend:
    build:
      context: ./ridx-terminal/frontend
      args:
        # Baked at build time (Vite). Point at the public RI URL for the
        # cross-origin watchlist/alerts API calls.
        VITE_RI_URL: ${APP_URL:-http://localhost:3000}
        VITE_API_URL: /api
    container_name: ridx_frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Jakarta}
    networks:
      apps_net:
        ipv4_address: 172.20.10.7
    ports:
      - "3001:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - terminal-backend

  # ── Public reverse proxy ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ri_nginx
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Jakarta}
    networks:
      apps_net:
        ipv4_address: 172.20.10.8
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - app
      - terminal-frontend
