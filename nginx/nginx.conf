# ═══════════════════════════════════════════════════════════════════════
# Root reverse proxy — host-based routing for the ecosystem.
#
#   regular-investor.com           → app (Astro SSR)        :4321
#   terminal.regular-investor.com  → terminal-frontend      :80
#       (the frontend's own nginx proxies /api → terminal-backend:8001)
#
# Replace server_name values with your real domains. For local testing, add to
# your hosts file:
#   127.0.0.1 regular-investor.local terminal.regular-investor.local
# and hit http://regular-investor.local / http://terminal.regular-investor.local
# ═══════════════════════════════════════════════════════════════════════

upstream ri_app        { server app:4321; }
upstream ridx_frontend { server terminal-frontend:80; }

# ── Regular Investor ──────────────────────────────────────────────────
server {
    listen 80;
    server_name regular-investor.com www.regular-investor.com regular-investor.local;

    client_max_body_size 10m;

    location / {
        proxy_pass http://ri_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ── R-IDX Terminal ────────────────────────────────────────────────────
server {
    listen 80;
    server_name terminal.regular-investor.com terminal.regular-investor.local;

    location / {
        proxy_pass http://ridx_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ── Default: reject unknown hosts ─────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
