# ═══════════════════════════════════════════════════════════════════════
# Root reverse proxy — host-based routing for the ecosystem.
# ═══════════════════════════════════════════════════════════════════════

# ── Hardening: Limit Zones ─────────────────────────────────────────────
# Membatasi request per detik (Rate: 10 Request/detik) berdasarkan IP
limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;

# Membatasi jumlah koneksi bersamaan dari 1 IP (Max: 20 koneksi)
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Hardening: Sembunyikan versi Nginx di HTTP Headers
server_tokens off;

# Hardening: Identifikasi Bad Bots (Scrapers/Spam)
map $http_user_agent $bad_bot {
    default 0;
    ~*(360Spider|80legs|Baiduspider|Bytespider|SemrushBot|AhrefsBot|PetalBot|YandexBot|MJ12bot|DotBot) 1;
}
# ───────────────────────────────────────────────────────────────────────

upstream ri_app        { server app:4321; }
upstream ridx_frontend { server terminal-frontend:80; }

# ── Regular Investor (Astro SSR) ──────────────────────────────────────
server {
    listen 80;
    server_name regular-investor.com www.regular-investor.com regular-investor.local app.regular-investor.local;

    # Hardening: Blokir Bad Bots
    if ($bad_bot) {
        return 403;
    }

    # Hardening: Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval';" always;

    client_max_body_size 10m;

    # Hardening: Timeout settings (mencegah Slowloris DoS)
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # Terapkan Rate Limit (Toleransi burst/lonjakan sementara 20 request)
    limit_req zone=req_limit burst=20 nodelay;
    limit_conn conn_limit 20;

    location / {
        proxy_pass http://ri_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ── R-IDX Terminal ────────────────────────────────────────────────────
server {
    listen 80;
    server_name terminal.regular-investor.com terminal.regular-investor.local;

    # Hardening: Blokir Bad Bots
    if ($bad_bot) {
        return 403;
    }

    # Hardening: Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval';" always;

    # Hardening: Timeout settings
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # Terapkan Rate Limit (Toleransi burst/lonjakan sementara 20 request)
    limit_req zone=req_limit burst=20 nodelay;
    limit_conn conn_limit 20;

    location / {
        proxy_pass http://ridx_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ── Default: reject unknown hosts ─────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
